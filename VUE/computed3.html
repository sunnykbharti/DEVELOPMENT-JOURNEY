<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <title>Computed with for Demo</title>
</head>
<body>
    <div id="app">
        <input v-model="search" placeholder="Search student...">

        <ul>
            <li v-for="(student, index) in filteredStudents" :key="index">
                {{ student }}
            </li>
        </ul>

        <p>Showing {{ filteredStudents.length }} of {{ students.length }}</p>
    </div>

    <script>
        Vue.createApp({
            data() {
                return {
                    search: '',
                    students: ['Sk', 'Raj', 'Priya', 'Sam', 'Sara']
                }
            },
            computed: {
                filteredStudents() {
                    return this.students.filter(student =>
                        student.toLowerCase().includes(this.search.toLowerCase())
                    )
                }
            }
        }).mount('#app')
    </script>
</body>
</html>
