<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <title>Emit Demo 1</title>
</head>
<body>
    <div id="app">
        <h2> Parent count : {{ count }}</h2>
        <counter-btn @increment-count="handleIncrement"></counter-btn>
    </div>
    <script>
        const app=Vue.createApp({
            data() {
                return {
                    count : 0
                }
            },
            methods : {
                handleIncrement () {
                    this.count++
                }
            }
        })

        app.component('counter-btn', {
            template : `
                <button @click="sendToParent">
                    Click Me!
                </button>
            `,
            methods : {
                sendToParent() {
                    this.$emit('increment-count')
                }
            }
        })
        app.mount('#app')
    </script>
</body>
</html>
