<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <title>Watchers Basic</title>
</head>
<body>
    <div id="app">
        <input v-model="name" placeholder="Enter You name...">
        <h3>{{message}}</h3>
    </div>
    <script>
        Vue.createApp({
            data() {
                return{
                    name:'',
                    message:''
                }
            },

            watch: {
                name(newv,oldv){
                    console.log('changed from',oldv,'to : ',newv)
                    this.message = 'You typed : ${oldv}'
                }
            }
        }).mount('#app')
    </script>
</body>
</html>
