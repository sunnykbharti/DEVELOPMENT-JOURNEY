<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <title>V-Model 1</title>
</head>
<body>
    <div id="app">
        <input v-model="name" placeholder = "Enter Your name">
        <h2> Hello, {{name}} </h2>
    </div>

    <script>
        Vue.createApp({

            data () {
                return {
                    name : ' '
                }
            }
        }).mount('#app')
    </script>
</body>
</html>
